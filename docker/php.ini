upload_max_filesize = 64M
post_max_size = 64M
memory_limit = 256M
max_execution_time = 300

opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000

; validate_timestamps=1 + revalidate_freq=10 => opcache rescans file mtimes every
; 10s, so a `git pull` + rebuild-less code change is picked up without a full
; container restart. Small perf cost, safer deploys.
opcache.validate_timestamps = 1
opcache.revalidate_freq = 10

; Log PHP errors -> container stderr (view via `docker logs -f`).
log_errors = On
error_log = /proc/self/fd/2
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL
log_errors_max_len = 0
