; Override the php-fpm www pool. Mounted via docker-compose so capacity can be
; changed with `docker compose restart app` (no rebuild).
[global]
error_log = /proc/self/fd/2
log_level = notice

[www]
; Send child stdout/stderr (echo, var_dump, fatal errors) to docker logs.
catch_workers_output = yes
decorate_workers_output = no
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on

; Keep workers alive as long as nginx fastcgi_read_timeout (300s).
request_terminate_timeout = 300

; Slow request log to hunt bottlenecks.
slowlog = /proc/self/fd/2
request_slowlog_timeout = 15s

; ---------------------------------------------------------------------------
; Process manager — tuned for a small (2 vCPU / 2 GB) box.
; php:8.3-fpm-alpine defaults to pm.max_children=5. Raise modestly; each child
; is a memory_limit (256M) ceiling, typical usage ~50-80MB.
; ---------------------------------------------------------------------------
pm = dynamic
pm.max_children = 8
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
; Recycle workers to avoid slow memory growth.
pm.max_requests = 500

pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong
